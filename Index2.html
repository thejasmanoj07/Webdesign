<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>RevDrive | Models & Pricing</title>

    <style>

        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }

        

        nav { background: #222; padding: 15px; display: flex; justify-content: space-between; align-items: center; }

        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }

        .logo { font-size: 24px; color: #3498db; margin-left: 20px; }



        .container { padding: 40px; text-align: center; }

        

        /* The Grid Layout */

        .car-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }



        /* Individual Car Cards */

        .card { background: white; width: 280px; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .card img { width: 100%; border-radius: 5px; }

        .card h3 { margin: 15px 0 5px; color: #222; }

        .card .price { color: #2ecc71; font-weight: bold; font-size: 20px; margin-bottom: 15px; }

        

        .buy-btn { background: #222; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; }

        .buy-btn:hover { background: #444; }



        footer { background: #222; color: white; padding: 20px; text-align: center; margin-top: 50px; }

    </style>

</head>

<body>



    <nav>

        <div class="logo">RE DRIVE</div>

        <div>

            <a href="index.html">Home</a>

            <a href="models.html">Car Models</a>

        </div>

    </nav>



    <div class="container">

        <h1>Available Car Models</h1>

        <p>Explore our latest inventory and pricing.</p>



        <div class="car-grid">

            <!-- Car 1 -->

            <div class="card">

                <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=300" alt="Car">

                <h3>Titan GT-Sport</h3>

                <p>Top Speed: 280 km/h</p>

                <p class="price">$45,000</p>

                <button class="buy-btn">View Details</button>

            </div>



            <!-- Car 2 -->

            <div class="card">

                <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=300" alt="Car">

                <h3>Explorer 4x4</h3>

                <p>Type: Luxury SUV</p>

                <p class="price">$38,500</p>

                <button class="buy-btn">View Details</button>

            </div>



            <!-- Car 3 -->

            <div class="card">

                <img src="https://images.unsplash.com/photo-1554744512-d6c603f27c54?w=300" alt="Car">

                <h3>EcoVolt Sedan</h3>

                <p>Type: Fully Electric</p>

                <p class="price">$52,000</p>

                <button class="buy-btn">View Details</button>

            </div>

        </div>

    </div>



    <footer>&copy; 2026 RevDrive Dealership</footer>



</body>

</html>
